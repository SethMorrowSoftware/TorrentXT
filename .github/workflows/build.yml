# .github/workflows/build.yml - TorrentXT CI (plan section 7 build/packaging,
# section 8 testing).
#
#   static-gates    : every push/PR. NO libtorrent, < 1 min. The always-green
#                     gate (LCB checker, record golden, registry cross-check,
#                     header-only record_handle_test under gcc ASan/UBSan).
#
#   sanitize        : the shim memory-safety gate - build the shim + smoke test
#                     under gcc ASan+UBSan against system libtorrent and run them.
#
#   build-matrix    : every push/PR. All five targets build the shim (Release)
#                     against libtorrent and run ctest. libtorrent is acquired
#                     per-OS by the most reliable route: apt (linux x64), vcpkg
#                     (Windows), Homebrew (macOS, host arch), and FetchContent at
#                     the pinned v2.0.11 built -m32 (linux x86). fail-fast off so
#                     one platform never masks another. Each lane uploads its
#                     built lib as the artifact native-<platform-id>.
#
#   commit-binaries : on push TO main, gather the built libs and commit the
#                     SELF-CONTAINED ones into src/code/<arch-platform>/ ([skip ci],
#                     so no loop) so the repo ships ready-to-use native libraries.
#                     Two gates: (1) main only - CI builds are not byte-reproducible,
#                     so a per-branch binary commit collides with main's (an add/add
#                     binary conflict that blocks the merge); binaries land once, on
#                     main, after merge. (2) self-contained only - a lib that
#                     dynamically links libtorrent (e.g. the host-arch macOS lane,
#                     Homebrew-rpathed) would NOT load on a user machine, so it is
#                     skipped per-file by readelf; only the macOS universal/
#                     notarized dylib still comes from the release build
#                     (building.md). The Linux/Windows lanes static-link libtorrent.
#
# NOTE on macOS: the CI lane builds+tests the HOST arch (arm64) — proving the
# binding compiles and runs on macOS. The shipped *universal* (arm64+x86_64),
# codesigned+notarized dylib is a separate release build (it needs Apple
# credentials we do not store in CI); see docs/building.md.
#
# All actions pinned to a major version, matching the sibling repos.

name: build

on:
  push:
    branches: ["**"]
  workflow_dispatch:
  # pull_request is intentionally omitted: this is same-repo branch development,
  # so the push event already runs CI and its commit checks show on the PR. That
  # avoids running the heavy build matrix TWICE per push (a push to a branch with
  # an open PR fires both push and pull_request). Re-add `pull_request:` if you
  # want CI to run on PRs opened from forks.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-gates:
    name: static gates (lint + golden + sanitized header test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: check-livecodescript
        run: python3 tools/check-livecodescript.py
      - name: record golden test
        run: python3 tests/record_golden_test.py
      - name: record-registry cross-check (if present)
        run: |
          if [ -f tools/check-record-registry.py ]; then
            python3 tools/check-record-registry.py
          else
            echo "tools/check-record-registry.py not present yet - skipping."
          fi
      - name: record_handle_test (gcc ASan+UBSan)
        run: |
          g++ -std=c++17 -Wall -Wextra \
            -fsanitize=address,undefined -fno-sanitize-recover=all \
            -fno-omit-frame-pointer \
            tests/record_handle_test.cpp -o record_handle_test
          ASAN_OPTIONS=halt_on_error=1 UBSAN_OPTIONS=halt_on_error=1 ./record_handle_test

  sanitize:
    # The shim memory-safety gate: build the shim + smoke test under gcc
    # ASan+UBSan against system libtorrent and run them. Kept separate from
    # build-matrix so the committed binaries stay clean Release builds (an
    # ASan-instrumented .so is not distributable).
    name: shim ASan+UBSan (linux x86_64)
    needs: static-gates
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Acquire libtorrent (apt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libtorrent-rasterbar-dev libboost-dev ninja-build
      - name: Configure + build + test under ASan/UBSan
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DTORRENTXT_BUILD_TESTS=ON \
            -DTORRENTXT_USE_SYSTEM_LIBTORRENT=ON \
            -DTORRENTXT_SANITIZE=ON
          cmake --build build --parallel 4
          # detect_container_overflow off: our ASan code links a non-instrumented
          # system libtorrent, which would otherwise false-positive on std
          # containers crossing that boundary.
          ASAN_OPTIONS=detect_container_overflow=0:halt_on_error=1 \
          UBSAN_OPTIONS=halt_on_error=1 \
          ctest --test-dir build --output-on-failure

  build-matrix:
    name: ${{ matrix.name }}
    needs: static-gates
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux x86_64 — FetchContent libtorrent @ v2.0.11, STATICALLY
          #      linked into our .so so the committed binary is self-contained (no
          #      system libtorrent at load). A source build: slow + RAM-heavy, so
          #      build_jobs: 2 like the 32-bit lane. The apt/dynamic build is NOT
          #      distributable (readelf shows NEEDED libtorrent-rasterbar.so), so
          #      commit-binaries would skip it; source-static is the shippable one.
          - name: linux-x86_64
            os: ubuntu-22.04
            platform_id: x86_64-linux
            acquire: linux64src
            # Cap parallelism: this lane compiles libtorrent from source and its
            # heaviest TUs each peak at multiple GB; 4 cores ran the 16 GB runner
            # out of RAM on the 32-bit lane, so keep it at 2 here too.
            build_jobs: 2
            # No TORRENTXT_USE_SYSTEM_LIBTORRENT -> FetchContent builds libtorrent
            # with BUILD_SHARED_LIBS OFF and static-links it in (Release, NOT
            # sanitized; the ASan/UBSan shim test runs against apt in `sanitize`).
            cmake_args: ""

          # ---- Linux x86 (32-bit) — FetchContent libtorrent @ v2.0.11, -m32,
          #      against the i386 system Boost. The hard lane (no 32-bit apt
          #      libtorrent); a source build, slow. ------------------------------
          - name: linux-x86
            os: ubuntu-22.04
            platform_id: x86-linux
            acquire: linux32
            # Cap build parallelism: this is the only lane that compiles
            # libtorrent itself (from source, -m32). libtorrent's heaviest TUs
            # (add_torrent_params.cpp et al.) each peak at multiple GB, and the
            # default `--parallel` (= 4 cores) ran the 16 GB runner out of RAM at
            # ~96%, taking the runner agent down ("received a shutdown signal").
            # Two at a time keeps the peak well under the limit.
            build_jobs: 2
            cmake_args: "-DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32 -DOPENSSL_SSL_LIBRARY=/usr/lib/i386-linux-gnu/libssl.so -DOPENSSL_CRYPTO_LIBRARY=/usr/lib/i386-linux-gnu/libcrypto.so -DOPENSSL_INCLUDE_DIR=/usr/include -DZLIB_LIBRARY=/usr/lib/i386-linux-gnu/libz.so -DZLIB_INCLUDE_DIR=/usr/include"

          # ---- macOS (host arch arm64) — brew system libtorrent. Universal +
          #      notarized dylib is a separate release build (see header note). --
          - name: macos
            os: macos-14
            platform_id: universal-mac
            acquire: brew
            cmake_args: "-DTORRENTXT_USE_SYSTEM_LIBTORRENT=ON"

          # ---- Windows x86_64 — vcpkg static libtorrent -----------------------
          - name: windows-x86_64
            os: windows-2022
            platform_id: x86_64-win32
            acquire: vcpkg
            vcpkg_triplet: x64-windows-static
            cmake_args: "-DTORRENTXT_USE_SYSTEM_LIBTORRENT=ON"

          # ---- Windows x86 (32-bit) — vcpkg static + the generated .def -------
          - name: windows-x86
            os: windows-2022
            platform_id: x86-win32
            acquire: vcpkg
            vcpkg_triplet: x86-windows-static
            cmake_args: "-DTORRENTXT_USE_SYSTEM_LIBTORRENT=ON -A Win32"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for package-extension.py)
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Acquire deps for the 64-bit static source build (Linux x86_64)
        if: matrix.acquire == 'linux64src'
        run: |
          sudo apt-get update
          # No system libtorrent: CMake FetchContent builds it from source at the
          # pinned tag and static-links it into our one .so. We need the C++
          # toolchain, CMake/Ninja, Boost headers, and OpenSSL/zlib dev. OpenSSL
          # stays a dynamic NEEDED dep (as on the 32-bit lane) - it is present on
          # every Linux target, unlike libtorrent.
          sudo apt-get install -y g++ cmake ninja-build libboost-dev libssl-dev zlib1g-dev

      - name: Acquire 32-bit toolchain + i386 OpenSSL/zlib (Linux x86)
        if: matrix.acquire == 'linux32'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          # The 32-bit C/C++ toolchain MUST succeed on its OWN line — it provides
          # Scrt1.o, crti.o, lib32stdc++, lib32gcc that -m32 needs.
          sudo apt-get install -y g++-multilib gcc-multilib ninja-build
          # libtorrent's find_package(OpenSSL)/(ZLIB) must resolve the i386 libs,
          # not the host amd64 ones, or the -m32 link fails with "file in wrong
          # format" (it pulled /usr/lib/x86_64-linux-gnu/libssl.so). Install them
          # REQUIRED; the lane's cmake_args point OPENSSL_*_LIBRARY / ZLIB_LIBRARY
          # explicitly at /usr/lib/i386-linux-gnu (a targeted override, so Boost's
          # arch-independent header-only discovery is left untouched). Boost is
          # header-only for libtorrent's use, so no :i386 Boost is needed.
          sudo apt-get install -y libssl-dev:i386 zlib1g-dev:i386
          # libtorrent's find_package(Boost) needs the Boost HEADERS. They are
          # header-only for libtorrent's use and arch-independent, so the amd64
          # libboost-dev provides /usr/include/boost for the -m32 build too. (The
          # runner image ships no Boost, so this MUST be installed explicitly.)
          sudo apt-get install -y libboost-dev

      - name: Acquire libtorrent (Homebrew, macOS host arch)
        if: matrix.acquire == 'brew'
        run: |
          brew update
          brew install libtorrent-rasterbar boost ninja

      - name: Set up vcpkg + acquire libtorrent (Windows)
        if: matrix.acquire == 'vcpkg'
        shell: pwsh
        run: |
          $vcpkg = $env:VCPKG_INSTALLATION_ROOT
          & "$vcpkg\vcpkg.exe" install "libtorrent:${{ matrix.vcpkg_triplet }}"
          echo "CMAKE_TOOLCHAIN_FILE=$vcpkg\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV

      - name: Configure
        shell: bash
        run: |
          EXTRA=""
          if [ -n "${CMAKE_TOOLCHAIN_FILE:-}" ]; then
            EXTRA="-DCMAKE_TOOLCHAIN_FILE=${CMAKE_TOOLCHAIN_FILE}"
            if [ -n "${VCPKG_TARGET_TRIPLET:-}" ]; then
              EXTRA="$EXTRA -DVCPKG_TARGET_TRIPLET=${VCPKG_TARGET_TRIPLET}"
            fi
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DTORRENTXT_BUILD_TESTS=ON \
            ${{ matrix.cmake_args }} \
            $EXTRA

      - name: Build
        # matrix.build_jobs caps parallelism on the from-source lane to avoid OOM;
        # the other lanes (prebuilt libtorrent) default to all cores.
        run: cmake --build build --config Release --parallel ${{ matrix.build_jobs || '4' }}

      - name: Test (ctest)
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Stage per-platform binary
        shell: bash
        run: |
          python3 tools/package-extension.py \
            --platform-id ${{ matrix.platform_id }} \
            --build-dir build || \
            echo "package-extension: nothing to stage."

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # named by platform-id so commit-binaries can place it without a map
          name: native-${{ matrix.platform_id }}
          path: src/code/${{ matrix.platform_id }}/
          if-no-files-found: ignore

  commit-binaries:
    # Automatic library placement: gather every freshly built lib and commit it
    # into its src/code/<arch-platform>/ folder so the repo ships ready-to-use
    # binaries (resolved by `the revLibraryMapping`). Runs only on push; the
    # commit carries [skip ci] so it does not trigger another run.
    #
    # NOTE: requires the repo's Actions setting "Workflow permissions" =
    # "Read and write permissions" (Settings > Actions > General) for the
    # GITHUB_TOKEN push to succeed.
    # Gated to main (not every branch): CI builds are not byte-reproducible, so a
    # per-branch binary commit collides with main's binaries and blocks the PR
    # merge with an unresolvable add/add binary conflict. Binaries are refreshed
    # once, on main, right after a merge.
    # macOS note: the staged universal-mac lib is the CI HOST arch (arm64) only;
    # the true universal+notarized dylib is a separate release build.
    name: commit native libs to src/code
    needs: build-matrix
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Download all built native libs
        uses: actions/download-artifact@v4
        with:
          path: _artifacts
          pattern: native-*
      - name: Place each SELF-CONTAINED lib into its src/code/<arch-platform>/ folder
        run: |
          # Only commit libraries that actually load standalone on a user machine.
          # A lane that dynamically links system/Homebrew libtorrent produces a
          # NON-distributable artifact (it needs that exact dev package installed),
          # so we refuse to ship it. Decided per-file by inspection, not by a
          # platform allow-list, so a lane that later static-links is picked up
          # automatically:
          #   *.dll  : Windows uses the vcpkg *-static triplet -> self-contained.
          #   *.so   : commit only if it does NOT dynamically NEED libtorrent
          #            (OpenSSL/libc are fine - present on every target).
          #   *.dylib: never from CI. The macOS artifact is the host arch (arm64)
          #            linked against Homebrew; the real universal + codesigned +
          #            notarized dylib is a separate release build that owns the
          #            Apple credentials (docs/building.md "macOS - universal +
          #            codesign/notarize").
          #   other  : never - a stray README or other non-lib file that rode along
          #            in an artifact folder is not a library and is not committed.
          shopt -s nullglob
          placed=0
          for dir in _artifacts/native-*/; do
            id="${dir#_artifacts/native-}"; id="${id%/}"
            for f in "$dir"*; do
              base="$(basename "$f")"
              case "$base" in
                *.dylib)
                  echo "SKIP src/code/$id/$base - macOS CI artifact is host-arch + Homebrew-linked, not a distributable universal/notarized build (see docs/building.md)."
                  continue ;;
                *.so)
                  if readelf -d "$f" 2>/dev/null | grep -q 'NEEDED.*libtorrent'; then
                    echo "SKIP src/code/$id/$base - dynamically links system libtorrent (not self-contained); static-link this lane to ship it."
                    continue
                  fi ;;
                *.dll)
                  : ;;  # vcpkg *-static -> self-contained; ship as-is
                *)
                  echo "SKIP src/code/$id/$base - not a library file; only .so/.dll are committed (a stray README or other file that rode along in an artifact must never be committed)."
                  continue ;;
              esac
              mkdir -p "src/code/$id"
              cp "$f" "src/code/$id/"
              echo "placed src/code/$id/$base"
              placed=1
            done
          done
          rm -rf _artifacts
          if [ "$placed" = 0 ]; then
            echo "No self-contained native-lib artifacts to commit (skipped non-distributable ones above)."
          fi
      - name: Commit refreshed binaries (skip CI to avoid a loop)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/code
          if git diff --cached --quiet; then
            echo "Native libs unchanged - nothing to commit."
            exit 0
          fi
          git commit -m "CI: place freshly built native libs in src/code/<arch-platform>/ [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}" || \
            echo "push rejected (branch advanced during the run); the next push refreshes it."
